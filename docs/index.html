<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<title>EU Coalition Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }
header { background:#0f172a; color:white; padding:15px; }
.controls { padding:10px; background:white; display:flex; flex-wrap:wrap; gap:10px; }

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
button.active { background:#0f172a; }

#network { width:100%; height:80vh; background:white; }

.info { padding:10px; font-size:13px; }
</style>
</head>

<body>

<header><h2>EU Coalition Map</h2></header>

<div class="controls">

<b>View</b>
<button class="view-btn active" data-view="graph">Graph</button>
<button class="view-btn" data-view="heatmap">Heatmap</button>

<b>Source</b>
<button class="source-btn active" data-source="combined">Combined</button>
<button class="source-btn" data-source="rss">RSS</button>
<button class="source-btn" data-source="gdelt">GDELT</button>

<b>Window</b>
<button class="window-btn" data-window="7d">7d</button>
<button class="window-btn active" data-window="30d">30d</button>
<button class="window-btn" data-window="90d">90d</button>

<b>Type</b>
<button class="type-btn active" data-type="all">All</button>
<button class="type-btn" data-type="internal">EU Internal</button>
<button class="type-btn" data-type="external">EU External</button>

<button id="fit">Középre</button>

</div>

<svg id="network"></svg>

<div class="info" id="info"></div>

<script>

let currentView = "graph";
let currentSource = "combined";
let currentWindow = "30d";
let currentType = "all";

const svg = d3.select("#network");
const info = document.getElementById("info");

let simulation;
let g;
let zoom;

function basePath() {
  return window.location.pathname.includes("eu-coalition-map")
    ? "/eu-coalition-map"
    : "";
}

function filePath() {
  let suffix = "";

  if (currentType === "internal") suffix = "_internal";
  if (currentType === "external") suffix = "_external";

  if (currentView === "heatmap") {
    return `${basePath()}/data/networks/${currentSource}/${currentWindow}_heatmap${suffix}.json`;
  }

  return `${basePath()}/data/networks/${currentSource}/${currentWindow}${suffix}.json`;
}

function setActive(selector, value, attr) {
  document.querySelectorAll(selector).forEach(b => {
    b.classList.toggle("active", b.dataset[attr] === value);
  });
}

document.querySelectorAll(".view-btn").forEach(b=>{
  b.onclick = () => {
    currentView = b.dataset.view;
    setActive(".view-btn", currentView, "view");
    load();
  };
});

document.querySelectorAll(".source-btn").forEach(b=>{
  b.onclick = () => {
    currentSource = b.dataset.source;
    setActive(".source-btn", currentSource, "source");
    load();
  };
});

document.querySelectorAll(".window-btn").forEach(b=>{
  b.onclick = () => {
    currentWindow = b.dataset.window;
    setActive(".window-btn", currentWindow, "window");
    load();
  };
});

document.querySelectorAll(".type-btn").forEach(b=>{
  b.onclick = () => {
    currentType = b.dataset.type;
    setActive(".type-btn", currentType, "type");
    load();
  };
});

document.getElementById("fit").onclick = () => {
  if (zoom) {
    svg.transition().call(zoom.transform, d3.zoomIdentity);
  }
};

function clear() {
  svg.selectAll("*").remove();
}

function drawGraph(data) {

  clear();

  const width = window.innerWidth;
  const height = window.innerHeight * 0.8;

  svg.attr("width", width).attr("height", height);

  zoom = d3.zoom().on("zoom", (e)=>g.attr("transform", e.transform));
  svg.call(zoom);

  g = svg.append("g");

  simulation = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.edges).id(d=>d.id).distance(120))
    .force("charge", d3.forceManyBody().strength(-250))
    .force("center", d3.forceCenter(width/2, height/2));

  const link = g.selectAll("line")
    .data(data.edges)
    .enter()
    .append("line")
    .attr("stroke","#999")
    .attr("stroke-width", d=>Math.sqrt(d.weight));

  const node = g.selectAll("circle")
    .data(data.nodes)
    .enter()
    .append("circle")
    .attr("r",8)
    .attr("fill","#2563eb")
    .call(d3.drag()
      .on("start", dragstart)
      .on("drag", drag)
      .on("end", dragend));

  const label = g.selectAll("text")
    .data(data.nodes)
    .enter()
    .append("text")
    .text(d=>d.id)
    .attr("font-size",12);

  simulation.on("tick", () => {

    link
      .attr("x1",d=>d.source.x)
      .attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x)
      .attr("y2",d=>d.target.y);

    node
      .attr("cx",d=>d.x)
      .attr("cy",d=>d.y);

    label
      .attr("x",d=>d.x+8)
      .attr("y",d=>d.y);
  });

  function dragstart(e,d){
    if(!e.active) simulation.alphaTarget(0.3).restart();
    d.fx=d.x; d.fy=d.y;
  }
  function drag(e,d){
    d.fx=e.x; d.fy=e.y;
  }
  function dragend(e,d){
    if(!e.active) simulation.alphaTarget(0);
    d.fx=null; d.fy=null;
  }

  info.innerText = `Nodes: ${data.nodes.length} | Edges: ${data.edges.length}`;
}

function drawHeatmap(data) {

  clear();

  const margin = {top:50,left:80};
  const cellSize = 25;

  const width = data.topics.length * cellSize + margin.left;
  const height = data.rows.length * cellSize + margin.top;

  svg.attr("width", width).attr("height", height);

  const maxVal = d3.max(data.rows, r => d3.max(data.topics, t => r[t]));

  const color = d3.scaleSequential(d3.interpolateOrRd)
    .domain([0, maxVal || 1]);

  const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

  data.rows.forEach((row,i)=>{
    data.topics.forEach((t,j)=>{

      g.append("rect")
        .attr("x", j*cellSize)
        .attr("y", i*cellSize)
        .attr("width", cellSize)
        .attr("height", cellSize)
        .attr("fill", color(row[t] || 0));
    });

    svg.append("text")
      .attr("x", 5)
      .attr("y", margin.top + i*cellSize + 18)
      .text(row.country)
      .attr("font-size",12);
  });

  data.topics.forEach((t,i)=>{
    svg.append("text")
      .attr("x", margin.left + i*cellSize + 5)
      .attr("y", 30)
      .text(t)
      .attr("font-size",11)
      .attr("transform", `rotate(-45 ${margin.left + i*cellSize},30)`);
  });

  info.innerText = `Heatmap | Countries: ${data.rows.length}`;
}

async function load() {

  const path = filePath();
  info.innerText = "Loading: " + path;

  try {
    const res = await fetch(path);

    if (!res.ok) throw new Error(res.status);

    const data = await res.json();

    if (currentView === "graph") {
      drawGraph(data);
    } else {
      drawHeatmap(data);
    }

  } catch (e) {
    info.innerText = "ERROR loading data";
    console.error(e);
  }
}

load();

</script>

</body>
</html>
