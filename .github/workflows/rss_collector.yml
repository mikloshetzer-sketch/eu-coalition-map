name: RSS Collector and Network Builder

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Ensure directory structure
        run: |
          mkdir -p data/events/rss
          mkdir -p data/events/gdelt
          mkdir -p data/networks/rss
          mkdir -p data/networks/gdelt
          mkdir -p data/networks/combined
          mkdir -p docs/data/networks/rss
          mkdir -p docs/data/networks/gdelt
          mkdir -p docs/data/networks/combined

      - name: Run RSS collector
        run: |
          python scripts/run_rss_collector.py

      - name: Build daily network
        run: |
          python scripts/build_daily_network.py

      - name: Build window networks
        run: |
          python scripts/build_window_networks.py

      - name: Copy networks for GitHub Pages
        run: |
          cp data/networks/rss/*.json docs/data/networks/rss/ || true
          cp data/networks/gdelt/*.json docs/data/networks/gdelt/ || true
          cp data/networks/combined/*.json docs/data/networks/combined/ || true

      - name: Commit data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/events/rss/*.jsonl || true
          git add data/events/gdelt/*.jsonl || true

          git add data/networks/rss/*.json || true
          git add data/networks/gdelt/*.json || true
          git add data/networks/combined/*.json || true

          git add docs/data/networks/rss/*.json || true
          git add docs/data/networks/gdelt/*.json || true
          git add docs/data/networks/combined/*.json || true

          git diff --cached --quiet || git commit -m "Update RSS events and networks"
          git push
