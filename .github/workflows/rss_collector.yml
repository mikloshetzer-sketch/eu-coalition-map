name: RSS Collector

on:
  schedule:
    - cron: "0 6 * * *"   # minden nap 06:00 UTC
  workflow_dispatch:      # manuálisan is futtatható

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser

      - name: Run RSS collector
        run: |
          python scripts/run_rss_collector.py

      - name: Commit collected data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/events/*.jsonl
          git commit -m "Update RSS events" || echo "No changes"
          git push
