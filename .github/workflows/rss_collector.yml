name: RSS Collector and Network Builder

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser

      - name: Run RSS collector
        run: |
          python scripts/run_rss_collector.py

      - name: Build daily network
        run: |
          python scripts/build_daily_network.py

      - name: Build window networks
        run: |
          python scripts/build_window_networks.py

      - name: Copy networks for GitHub Pages
        run: |
          mkdir -p docs/data/networks
          cp data/networks/*.json docs/data/networks/

      - name: Commit data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/events/*.jsonl
          git add data/networks/*.json
          git add docs/data/networks/*.json

          git diff --cached --quiet || git commit -m "Update events and networks"
          git push
