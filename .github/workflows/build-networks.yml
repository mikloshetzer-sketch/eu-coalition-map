name: Build EU Networks

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Build MEP reference
        run: |
          python scripts/build_mep_reference.py

      - name: DEBUG votes names
        run: |
          python scripts/debug_votes_names.py

      - name: Run votes collector
        run: |
          python scripts/run_votes_collector.py

      - name: Build networks
        run: |
          python scripts/build_window_networks.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/reference
          git add data/events/votes
          git add data/networks
          git add docs/data/networks

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update networks, debug names, MEP reference and votes data"
            git push
          fi
