name: Build data pipeline

on:
  schedule:
    - cron: "0 5 * * *"     # napi futás
    - cron: "0 6 * * 1"     # heti riport (hétfő)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      # 🔹 1. HÁLÓZATOK ÉPÍTÉSE (MEGLÉVŐ)
      - name: Build network data
        run: |
          if [ -f scripts/build_networks.py ]; then
            python scripts/build_networks.py
          else
            echo "No network builder script found, skipping."
          fi

      # 🔹 2. HETI RIPORT (MEGLÉVŐ)
      - name: Build weekly report
        run: |
          if [ -f scripts/build_weekly_report.py ]; then
            python scripts/build_weekly_report.py
          else
            echo "No weekly report script found, skipping."
          fi

      # 🔥 3. BLOG JSON GENERÁLÁS (ÚJ)
      - name: Generate blog insight JSON
        run: |
          if [ -f scripts/generate_blog_insight.py ]; then
            python scripts/generate_blog_insight.py
          else
            echo "No blog insight generator found, skipping."
          fi

      # 🔹 4. COMMIT (MEGLÉVŐ LOGIKA)
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data docs/data
          git diff --cached --quiet || git commit -m "Update data pipeline outputs"
          git push
